name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2.0.4)'
        required: true
        default: 'v2.0.4'

jobs:
  windows-installer:
    name: Build Windows installer (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Install Inno Setup
        run: choco install innosetup --yes
      - name: Restore and publish (x64)
        run: |
          dotnet restore Mukti.sln
          dotnet publish src/Mukti.WindowsAddin/Mukti.WindowsAddin.csproj --configuration Release --runtime win-x64 --self-contained true --output src/Mukti.WindowsAddin/bin/Release/net8.0-windows/win-x64/publish
      - name: Build Inno Setup installer
        run: iscc installer\windows\setup.iss
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-installer-x64
          path: installer/windows/output/Mukti-Setup-*.exe

  windows-arm64:
    name: Build Windows add-in (ARM64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore and publish (ARM64)
        run: |
          dotnet restore Mukti.sln
          dotnet publish src/Mukti.WindowsAddin/Mukti.WindowsAddin.csproj --configuration Release --runtime win-arm64 --no-self-contained --output src/Mukti.WindowsAddin/bin/Release/net8.0-windows/win-arm64/publish
      - name: Package ARM64 binaries
        run: Compress-Archive -Path src/Mukti.WindowsAddin/bin/Release/net8.0-windows/win-arm64/publish/* -DestinationPath installer/windows/output/Mukti-${{ github.ref_name }}-arm64-binaries.zip -Force
        shell: pwsh
      - name: Upload ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-arm64-binaries
          path: installer/windows/output/Mukti-*-arm64-binaries.zip

  mac-pkg:
    name: Build Mac pkg
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore Mac projects
        run: |
          dotnet restore src/Mukti.Engine/Mukti.Engine.csproj
          dotnet restore src/Mukti.Mac/Mukti.Mac.csproj
      - name: Build Mac package
        run: |
          chmod +x installer/mac/build-pkg.sh installer/mac/pkg-scripts/postinstall installer/mac/pkg-scripts/preremove
          bash installer/mac/build-pkg.sh
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: mac-pkg
          path: installer/mac/output/*.pkg

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [windows-installer, mac-pkg]
    if: always() && needs.windows-installer.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Mukti ${{ github.ref_name }}
          body: |
            ## Mukti ${{ github.ref_name }}

            ### Install
            - **Windows (x64)**: Download `Mukti-Setup-*.exe` and double-click. Mukti appears in the Office ribbon automatically.
            - **Windows (ARM64)**: Download `*-arm64-binaries.zip`, extract, and run `register-addin.ps1 -Install` as administrator.
            - **Mac**: Download `Mukti-*.pkg`. Right-click → **Open** (once, to bypass Gatekeeper). Then open Word.

            ### Privacy
            Your document content never leaves your device.

            ### Support
            https://github.com/GRU-953/Mukti/issues
          files: |
            release-artifacts/**/*.exe
            release-artifacts/**/*.pkg
            release-artifacts/**/*.zip
          draft: false
          prerelease: false
