name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2.0.3)'
        required: true
        default: 'v2.0.3'

jobs:
  windows-installer:
    name: Build + Sign Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Install Inno Setup
        run: choco install innosetup --yes
      - name: Restore and publish
        run: |
          dotnet restore Mukti.sln
          dotnet publish src/Mukti.WindowsAddin/Mukti.WindowsAddin.csproj --configuration Release --runtime win-x64 --self-contained true --output src/Mukti.WindowsAddin/bin/Release/net8.0-windows/win-x64/publish
      - name: Build Inno Setup installer
        run: iscc installer\windows\setup.iss
      - name: Stage for signing
        run: |
          New-Item -ItemType Directory -Force installer\windows\output\stage | Out-Null
          Copy-Item installer\windows\output\*.exe installer\windows\output\stage\
      - name: Upload unsigned installer
        id: upload_for_signing
        uses: actions/upload-artifact@v4
        with:
          name: win-installer-unsigned
          path: installer/windows/output/stage/*.exe
      # SignPath Foundation — free Authenticode signing for open source
      # Apply at https://about.signpath.io/product/open-source
      # Then add SIGNPATH_API_TOKEN + SIGNPATH_ORGANIZATION_ID secrets to this repo
      - name: Sign with SignPath Foundation
        uses: signpath/github-action-submit-signing-request@v1
        continue-on-error: true
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ secrets.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: mukti
          signing-policy-slug: release-signing
          artifact-configuration-slug: inno-setup
          github-artifact-id: win-installer-unsigned
          wait-for-completion: true
          output-artifact-directory: installer/windows/output/signed
      - name: Promote signed installer
        shell: bash
        run: |
          if [ -d installer/windows/output/signed ] && ls installer/windows/output/signed/*.exe 2>/dev/null; then
            cp installer/windows/output/signed/*.exe installer/windows/output/
            echo "Using signed installer"
          else
            echo "Using unsigned installer (SignPath not configured)"
          fi
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: |
            installer/windows/output/*.exe
            !installer/windows/output/stage/**

  mac-pkg:
    name: Build Mac pkg
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore Mac projects
        run: |
          dotnet restore src/Mukti.Engine/Mukti.Engine.csproj
          dotnet restore src/Mukti.Mac/Mukti.Mac.csproj
      - name: Build Mac package
        run: |
          chmod +x installer/mac/build-pkg.sh installer/mac/pkg-scripts/postinstall installer/mac/pkg-scripts/preremove
          bash installer/mac/build-pkg.sh
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: mac-pkg
          path: installer/mac/output/*.pkg

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [windows-installer, mac-pkg]
    if: always() && needs.windows-installer.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Mukti ${{ github.ref_name }}
          body: |
            ## Mukti ${{ github.ref_name }}

            ### Install
            - **Windows**: Download `Mukti-Setup-*.exe` and double-click. Mukti appears in the Office ribbon automatically.
            - **Mac**: Download `Mukti-*.pkg`. Right-click → **Open** (once, to bypass Gatekeeper). Then open Word.

            ### Privacy
            Your document content never leaves your device.

            ### Support
            https://github.com/GRU-953/Mukti/issues
          files: |
            release-artifacts/**/*.exe
            release-artifacts/**/*.pkg
          draft: false
          prerelease: false
