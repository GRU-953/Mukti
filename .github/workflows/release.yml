name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2.0.4)'
        required: true
        default: 'v2.0.4'

jobs:
  windows-installer:
    name: Build Windows installer (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Install Inno Setup
        run: choco install innosetup --yes
      - name: Restore and publish (x64)
        run: |
          dotnet restore Mukti.sln
          dotnet publish src/Mukti.WindowsAddin/Mukti.WindowsAddin.csproj --configuration Release --runtime win-x64 --no-self-contained --output src/Mukti.WindowsAddin/bin/Release/net8.0-windows/win-x64/publish
      - name: Verify DLL version matches tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"           # e.g. "v2.0.19"
          $expected = $tag.TrimStart('v') + ".0"    # e.g. "2.0.19.0"
          $dll = "src/Mukti.WindowsAddin/bin/Release/net8.0-windows/win-x64/publish/Mukti.WindowsAddin.dll"
          $actual = [System.Diagnostics.FileVersionInfo]::GetVersionInfo($dll).FileVersion
          Write-Host "Tag: $tag  Expected: $expected  Actual: $actual"
          if ($actual -ne $expected) {
            Write-Error "DLL version mismatch: expected $expected, got $actual"
            exit 1
          }
          Write-Host "Version OK: $actual"
      - name: Build Inno Setup installer
        run: iscc installer\windows\setup.iss
      - name: Upload unsigned installer
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: win-installer-x64-unsigned
          path: installer/windows/output/Mukti-Setup-*.exe
      # Sign with SignPath.io (free for open source).
      # Requires: vars.SIGNPATH_ORGANIZATION_ID (repo variable) and
      #           secrets.SIGNPATH_API_TOKEN (repo secret).
      # If neither is configured this step is skipped and the unsigned
      # installer is released — SmartScreen will show "Unknown publisher".
      # Setup: https://signpath.io/product/open-source
      - name: Sign installer (SignPath.io)
        id: signpath
        if: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' }}
        uses: SignPath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: Mukti
          signing-policy-slug: release-signing
          artifact-configuration-slug: installer
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed
      - name: Prepare final installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $signed = Get-ChildItem signed\Mukti-Setup-*.exe -ErrorAction SilentlyContinue
          if ($signed) {
            Copy-Item $signed.FullName dist\
            Write-Host "Signed installer ready: $($signed.Name)"
          } else {
            Copy-Item installer\windows\output\Mukti-Setup-*.exe dist\
            Write-Host "Unsigned installer (SignPath not configured)"
          }
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-installer-x64
          path: dist/Mukti-Setup-*.exe

  windows-arm64:
    name: Build Windows installer (ARM64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Install Inno Setup
        run: choco install innosetup --yes
      - name: Restore and publish (ARM64)
        run: |
          dotnet restore Mukti.sln
          dotnet publish src/Mukti.WindowsAddin/Mukti.WindowsAddin.csproj --configuration Release --runtime win-arm64 --no-self-contained --output src/Mukti.WindowsAddin/bin/Release/net8.0-windows/win-arm64/publish
      - name: Verify DLL version matches tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"           # e.g. "v2.0.19"
          $expected = $tag.TrimStart('v') + ".0"    # e.g. "2.0.19.0"
          $dll = "src/Mukti.WindowsAddin/bin/Release/net8.0-windows/win-arm64/publish/Mukti.WindowsAddin.dll"
          $actual = [System.Diagnostics.FileVersionInfo]::GetVersionInfo($dll).FileVersion
          Write-Host "Tag: $tag  Expected: $expected  Actual: $actual"
          if ($actual -ne $expected) {
            Write-Error "DLL version mismatch: expected $expected, got $actual"
            exit 1
          }
          Write-Host "Version OK: $actual"
      - name: Build Inno Setup installer (ARM64)
        run: iscc installer\windows\setup-arm64.iss
      - name: Upload unsigned installer
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: win-installer-arm64-unsigned
          path: installer/windows/output/Mukti-Setup-*-arm64.exe
      - name: Sign installer (SignPath.io)
        id: signpath
        if: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' }}
        uses: SignPath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: Mukti
          signing-policy-slug: release-signing
          artifact-configuration-slug: installer
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed
      - name: Prepare final installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $signed = Get-ChildItem signed\Mukti-Setup-*-arm64.exe -ErrorAction SilentlyContinue
          if ($signed) {
            Copy-Item $signed.FullName dist\
            Write-Host "Signed installer ready: $($signed.Name)"
          } else {
            Copy-Item installer\windows\output\Mukti-Setup-*-arm64.exe dist\
            Write-Host "Unsigned installer (SignPath not configured)"
          }
      - name: Upload ARM64 installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-installer-arm64
          path: dist/Mukti-Setup-*-arm64.exe

  mac-pkg:
    name: Build Mac pkg
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore Mac projects
        run: |
          dotnet restore src/Mukti.Engine/Mukti.Engine.csproj
          dotnet restore src/Mukti.Mac/Mukti.Mac.csproj
      - name: Build Mac package
        run: |
          chmod +x installer/mac/build-pkg.sh installer/mac/pkg-scripts/postinstall installer/mac/pkg-scripts/preremove
          bash installer/mac/build-pkg.sh
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: mac-pkg
          path: installer/mac/output/*.pkg

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [windows-installer, windows-arm64, mac-pkg]
    if: always() && needs.windows-installer.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Mukti ${{ github.ref_name }}
          body: |
            ## Mukti ${{ github.ref_name }}

            ### Install
            - **Windows (x64)**: Download `Mukti-Setup-*.exe` and double-click. Mukti appears in the Office ribbon automatically.
            - **Windows (ARM64, preview)**: Download `Mukti-Setup-*-arm64.exe` and install. Run `register-addin-arm64.ps1 -Install` when ARM64-native Office is available.
            - **Mac**: Download `Mukti-*.pkg`. Right-click → **Open** (once, to bypass Gatekeeper). Then open Word.

            ### Privacy
            Your document content never leaves your device.

            ### Support
            https://github.com/GRU-953/Mukti/issues
          files: |
            release-artifacts/**/*.exe
            release-artifacts/**/*.pkg
            release-artifacts/**/*.zip
          draft: false
          prerelease: false
