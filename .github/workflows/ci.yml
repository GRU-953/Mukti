name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read # least privilege; CI needs no write access

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint # engine purity rule + style + tsc
      - run: npm test # unit tests + data schema validation
      - run: npm run corpus:gate # build engine, visible + heldout >=99%, fuzz, freeze --check
